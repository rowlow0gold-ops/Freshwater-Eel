<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Brand red rounded square -->
  <rect width="64" height="64" rx="14" fill="#b91c1c"/>
  <!-- Subtle radial highlight -->
  <defs>
    <radialGradient id="hi" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#hi)"/>

  <!-- Eel silhouette: S-curve body + tail fin -->
  <g fill="#fff">
    <!-- Body (S-shaped) -->
    <path d="M14 38c4-7 11-10 18-7s12 8 18 4c-1 3-4 6-9 7-7 1-12-3-17-5s-9 0-10 1z" opacity="0.95"/>
    <!-- Head with eye -->
    <circle cx="50" cy="32" r="2.2" fill="#b91c1c"/>
    <!-- Tail fin -->
    <path d="M10 35c1-3 1-6 0-9 4 2 5 5 5 7s-1 4-5 2z" opacity="0.95"/>
  </g>
</svg>
